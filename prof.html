<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">

                <div>
                    <h2>ManoloStays</h2>
                    <p>Book. Stay. Relax.</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dash.html"><span>🏠</span> Dashboard</a>
                <a href="dation.html"><span>🏨</span> Accommodations</a>
                <a href="books.html"><span>📅</span> My Bookings</a>
                <a href="payment.html"><span>💳</span> Payments</a>
                <a href="#" class="active"><span>👤</span> Profile</a>
            </nav>
            <div class="sidebar-footer">
                <p>© 2026 ManoloStays- All rights reserved.</p>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="content-header">
                <div class="welcome-text">
                    <h1>Profile</h1>
                    <p>Manage your account information.</p>
                </div>
                <div class="header-actions">
                    <div class="user-profile">
                        <span id="nav-user-name"></span>
                        <img src="image/AVA1.jpg" alt="User">
                    </div>
                </div>
            </header>

            <div class="profile-grid">
                <!-- Personal Information Card -->
                <div class="profile-card">
                    <h3>Personal Information</h3>

                    <div class="info-group">
                        <label>Full Name</label>
                        <p id="display-name"></p>
                    </div>
                    <div class="info-group">
                        <label>Email Address</label>
                        <span id="profileEmail"></span>
                    </div>
                   
                    <button class="primary-btn" onclick="editProfile()">Edit Profile</button>
                </div>

                <!-- EDIT PROFILE MODAL -->
                <div id="edit-modal" class="modal-overlay" style="display: none;">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>Edit Personal Information</h2>
                            <button class="close-btn" onclick="closeModal()">&times;</button>
                        </div>
                    <div class="modal-body">
                        <div class="input-field">
                            <label>Full Name</label>
                            <input type="text" id="edit-name">
                        </div>
                    
                        <div class="input-field">
                            <label>Email Address</label>
                            <input type="email" id="edit-email">
                        </div>
                    
                          <button class="primary-btn" onclick="saveProfile()">Save Changes</button>
                    </div>
                    </div>
                </div>

                <!-- Change Password Card -->
                <div class="profile-card">
                    <h3>Change Password</h3>
                    <div class="input-field">
                        <label>Current Password</label>
                        <input type="password" id="curr-pass" placeholder="••••••••">
                    </div>
                    <div class="input-field">
                        <label>New Password</label>
                        <input type="password" id="new-pass" placeholder="••••••••">
                    </div>
                    <div class="input-field">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirm-pass" placeholder="••••••••">
                    </div>
                    <button class="primary-btn" onclick="updatePassword()">Update Password</button>
                </div>
            </div>

            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </main>
    </div>

    <script src="prof.js"></script>


</body>

</html>
